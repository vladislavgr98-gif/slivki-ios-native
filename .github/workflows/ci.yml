name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  swift:
    name: Swift tests
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Run Swift package tests
        run: swift test

  mobile-api-smoke:
    name: Mobile API smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SLIVKI_API_BASE: ${{ vars.SLIVKI_API_BASE || 'https://slivki-shop.ru/api/mobile/v1' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run mobile API smoke test
        run: python scripts/smoke_mobile_api.py
